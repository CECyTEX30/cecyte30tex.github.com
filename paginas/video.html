<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video presentación</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f7a3a,#00c853,#a4e4b6);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* CONTENEDOR */
.container{
    width:90%;
    max-width:1000px;
    background:white;
    border-radius:25px;
    padding:30px;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

/* PARTE SUPERIOR */
.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

/* TÍTULO */
.title{
    color:#0f7a3a;
    font-size:2.3rem;
}

/* BOTÓN */
.back-btn{
    padding:8px 15px;
    background:linear-gradient(135deg,#00c853,#69f0ae);
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:0.9rem;
    font-weight:bold;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.back-btn:hover{
    transform:scale(1.05);
}

/* VIDEO */
.video-box{
    width:100%;
    height:500px;
    border-radius:20px;
    overflow:hidden;
    background:#e8f5e9;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* TEXTO */
.video-text{
    margin-top:20px;
    background:#f1fff4;
    padding:18px;
    border-radius:15px;
    color:#0f7a3a;
    font-size:1rem;
    line-height:1.6;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* RESPONSIVE */
@media(max-width:768px){

    .top{
        flex-direction:column;
        gap:15px;
    }

    .title{
        font-size:1.8rem;
        text-align:center;
    }

    .video-box{
        height:250px;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- PARTE SUPERIOR -->
    <div class="top">

       <strong><h1 class="title">Video presentación</h1></strong> 

        <a href="../index.html" class="back-btn">
            ⬅ Regresar
        </a>

    </div>

    <!-- VIDEO -->
    <div class="video-box">

        <video controls>
            <source src="../videos/chavita.mp4" type="video/mp4">
           
        </video>

    </div>

    <!-- TEXTO -->
    <div class="video-text">
    Video publicitario del CECyTE 30 realizado por alumnos de 6B mediante cut out 
    </div>

</div>

</body>
</html>
